<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --radius: 12px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 0;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.4px;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 14px;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding-bottom: 64px;
    }

    .tool-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .tool-card:hover {
      border-color: #58a6ff55;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .tool-thumb {
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg3);
    }

    .tool-thumb svg,
    .tool-thumb img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tool-info {
      padding: 16px 18px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tool-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .tool-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tool-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: var(--bg3);
      color: var(--text-muted);
      border: 1px solid var(--border);
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Tools</h1>
      <p>A collection of handy browser-based utilities</p>
    </header>

    <div class="tools-grid">

        </div>
        <div class="tool-info">
          <div class="tool-name">Which Theme?</div>
          <div class="tool-desc">Compare color schemes side by side. Browse palettes, copy colors in any CSS format, and export as CSS custom properties.</div>
          <span class="tool-tag">Color</span>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
