<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375">
  <!-- Background -->
  <rect width="600" height="375" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="600" height="34" fill="#313244"/>
  <circle cx="18" cy="17" r="5.5" fill="#f38ba8"/>
  <circle cx="34" cy="17" r="5.5" fill="#f9e2af"/>
  <circle cx="50" cy="17" r="5.5" fill="#a6e3a1"/>
  <text x="300" y="22" text-anchor="middle" fill="#6c7086" font-family="sans-serif" font-size="12">bash — terminal</text>

  <!-- Prompt 1: user@hostname ~/projects/my-scheme -->
  <text x="16" y="68" font-family="monospace" font-size="12" fill="#a6e3a1">user</text>
  <text x="55" y="68" font-family="monospace" font-size="12" fill="#cdd6f4">@</text>
  <text x="64" y="68" font-family="monospace" font-size="12" fill="#89b4fa">hostname</text>
  <text x="131" y="68" font-family="monospace" font-size="12" fill="#cdd6f4"> </text>
  <text x="138" y="68" font-family="monospace" font-size="12" fill="#cba6f7">~/projects/my-scheme</text>

  <!-- Command line 1: $ npm run dev -->
  <text x="16" y="88" font-family="monospace" font-size="12" fill="#a6e3a1">$</text>
  <text x="26" y="88" font-family="monospace" font-size="12" fill="#cdd6f4"> npm run dev</text>

  <!-- Output block -->
  <text x="16" y="112" font-family="monospace" font-size="11" fill="#6c7086">&gt; my-scheme@1.0.0 dev</text>
  <text x="16" y="128" font-family="monospace" font-size="11" fill="#6c7086">&gt; vite</text>
  <text x="16" y="152" font-family="monospace" font-size="11" fill="#a6e3a1">  VITE v5.4.0</text>
  <text x="110" y="152" font-family="monospace" font-size="11" fill="#cdd6f4">  ready in 187 ms</text>
  <text x="16" y="170" font-family="monospace" font-size="11" fill="#6c7086">  ➜  Local:   </text>
  <text x="105" y="170" font-family="monospace" font-size="11" fill="#89dceb">http://localhost:5173/</text>
  <text x="16" y="186" font-family="monospace" font-size="11" fill="#6c7086">  ➜  Network: </text>
  <text x="105" y="186" font-family="monospace" font-size="11" fill="#6c7086">use --host to expose</text>
  <text x="16" y="202" font-family="monospace" font-size="11" fill="#6c7086">  ➜  press </text>
  <text x="82" y="202" font-family="monospace" font-size="11" fill="#f9e2af">h</text>
  <text x="90" y="202" font-family="monospace" font-size="11" fill="#6c7086"> to show help</text>

  <!-- Divider -->
  <line x1="16" y1="222" x2="584" y2="222" stroke="#45475a" stroke-width="1" opacity="0.4"/>

  <!-- Prompt 2: user@hostname -->
  <text x="16" y="242" font-family="monospace" font-size="12" fill="#a6e3a1">user</text>
  <text x="55" y="242" font-family="monospace" font-size="12" fill="#cdd6f4">@</text>
  <text x="64" y="242" font-family="monospace" font-size="12" fill="#89b4fa">hostname</text>
  <text x="131" y="242" font-family="monospace" font-size="12" fill="#cdd6f4"> </text>
  <text x="138" y="242" font-family="monospace" font-size="12" fill="#cba6f7">~/projects/my-scheme</text>

  <!-- Command line 2: $ git status -->
  <text x="16" y="262" font-family="monospace" font-size="12" fill="#a6e3a1">$</text>
  <text x="26" y="262" font-family="monospace" font-size="12" fill="#cdd6f4"> git status</text>

  <!-- Git output -->
  <text x="16" y="282" font-family="monospace" font-size="11" fill="#cdd6f4">On branch </text>
  <text x="84" y="282" font-family="monospace" font-size="11" fill="#a6e3a1">main</text>
  <text x="16" y="298" font-family="monospace" font-size="11" fill="#cdd6f4">Changes not staged for commit:</text>
  <text x="24" y="314" font-family="monospace" font-size="11" fill="#f38ba8">  modified:   src/main.ts</text>
  <text x="24" y="330" font-family="monospace" font-size="11" fill="#a6e3a1">  new file:   src/theme.ts</text>

  <!-- Prompt 3 with cursor -->
  <text x="16" y="354" font-family="monospace" font-size="12" fill="#a6e3a1">user</text>
  <text x="55" y="354" font-family="monospace" font-size="12" fill="#cdd6f4">@</text>
  <text x="64" y="354" font-family="monospace" font-size="12" fill="#89b4fa">hostname</text>
  <text x="131" y="354" font-family="monospace" font-size="12" fill="#cba6f7"> ~/projects/my-scheme</text>
  <!-- Cursor block -->
  <rect x="16" y="360" width="8" height="13" fill="#cdd6f4" opacity="0.75"/>
</svg>
